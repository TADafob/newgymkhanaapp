workflows:
  flutter-app:
    name: Flutter App Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      vars:
        PROJECT_NAME: "ngymkhana app"
        FLUTTER_DISABLE_SWIFT_PACKAGE_MANAGER: "true"
    scripts:
      - name: Install dependencies
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release --verbose 2>&1 | tail -100
      - name: Build iOS App
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.ipa
    publishing:
      email:
        recipients:
          - "dafobnito@gmail.com"
